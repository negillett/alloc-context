name: bump-release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver increment (ignored when exact_version is set)
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      exact_version:
        description: Exact version (e.g. 0.2.0); overrides bump
        required: false
        type: string

permissions:
  contents: write

jobs:
  bump-and-tag:
    if: github.repository == 'negillett/alloc-context'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve and apply version bump
        id: bump
        run: |
          set -euo pipefail
          ARGS=(scripts/bump_version.py --write --print)
          if [ -n "${{ inputs.exact_version }}" ]; then
            ARGS+=("${{ inputs.exact_version }}")
          else
            ARGS+=(--bump "${{ inputs.bump }}")
          fi
          NEW=$(python3 "${ARGS[@]}")
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git add pyproject.toml server.json alloccontext/__init__.py
          if git diff --staged --quiet; then
            echo "No version changes to commit"
            exit 1
          fi
          git commit -m "Bump version to ${VERSION}."
          git tag -a "$TAG" -m "Release ${VERSION}"
          git pull --rebase origin main
          git push origin main
          git push origin "$TAG"
