name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  validate-version:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Match tag to package versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PY_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SJ_VER=$(python3 -c "import json; print(json.load(open('server.json'))['version'])")
          PKG_VER=$(python3 -c "import json; print(json.load(open('server.json'))['packages'][0]['version'])")
          echo "tag=v${TAG} pyproject=${PY_VER} server.json=${SJ_VER} package=${PKG_VER}"
          test "${TAG}" = "${PY_VER}"
          test "${TAG}" = "${SJ_VER}"
          test "${TAG}" = "${PKG_VER}"

  publish-pypi:
    needs: validate-version
    if: github.repository == 'negillett/alloc-context'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  deploy:
    needs: validate-version
    if: github.repository == 'negillett/alloc-context'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Require VPS secrets
        run: |
          test -n "${{ secrets.VPS_SSH_KEY }}" || {
            echo "VPS_SSH_KEY secret is not set — see docs/self-hosting.md"
            exit 1
          }
          test -n "${VPS_HOST}" || {
            echo "VPS_HOST secret is not set — see docs/self-hosting.md"
            exit 1
          }

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Rsync to VPS
        env:
          REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
        run: |
          REMOTE="${REMOTE:-/opt/alloc-context}"
          USER="${VPS_USER:-root}"
          rsync -avz --delete \
            --exclude '.venv/' \
            --exclude '.git/' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '/state/' \
            --exclude 'config/config.yaml' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "${USER}@${VPS_HOST}:${REMOTE}/"

      - name: Install on VPS
        env:
          DEPLOYED_SHA: ${{ github.sha }}
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
          ALLOC_CONTEXT_ENV_FILE: ${{ vars.ALLOC_CONTEXT_ENV_FILE }}
        run: |
          USER="${VPS_USER:-root}"
          REMOTE="${ALLOC_CONTEXT_REMOTE:-/opt/alloc-context}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${USER}@${VPS_HOST}" \
            "DEPLOYED_SHA=${DEPLOYED_SHA} ALLOC_CONTEXT_REMOTE=${REMOTE} ALLOC_CONTEXT_ENV_FILE=${ALLOC_CONTEXT_ENV_FILE} bash -s" \
            < deploy/remote-install.sh

      - name: Post-deploy smoke
        env:
          SMOKE_EXPECT_CORE_SHA: ${{ github.sha }}
          ALLOC_CONTEXT_OPERATOR_REMOTE: ${{ vars.ALLOC_CONTEXT_OPERATOR_REMOTE }}
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
        run: bash deploy/run-vps-smoke.sh

      - name: Post-deploy x402 check
        env:
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
          ALLOC_CONTEXT_ENV_FILE: ${{ vars.ALLOC_CONTEXT_ENV_FILE }}
        run: bash deploy/run-vps-x402-check.sh

      - name: Deploy summary
        run: echo "Released ${GITHUB_REF_NAME} (${GITHUB_SHA}) to configured host"
