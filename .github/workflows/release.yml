name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    if: github.repository == 'negillett/alloc-context'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decide whether to release
        id: decide
        run: |
          set -euo pipefail
          VERSION=$(python3 scripts/bump_version.py --current)
          python3 scripts/bump_version.py --check "$VERSION"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "v${VERSION} already tagged — no release"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v${VERSION} has no tag — releasing"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  publish-pypi:
    needs: [check, test]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-mcp-registry:
    needs: [check, publish-pypi]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: bash scripts/install-mcp-publisher.sh ./mcp-publisher
      - name: Publish to MCP Registry
        run: bash scripts/publish-mcp-registry.sh ./mcp-publisher

  deploy:
    needs: [check, publish-pypi]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record release SHA
        id: checkout
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require VPS secrets
        run: |
          test -n "${{ secrets.VPS_SSH_KEY }}" || {
            echo "VPS_SSH_KEY secret is not set — see docs/self-hosting.md"
            exit 1
          }
          test -n "${VPS_HOST}" || {
            echo "VPS_HOST secret is not set — see docs/self-hosting.md"
            exit 1
          }

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Rsync to VPS
        env:
          REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
        run: |
          REMOTE="${REMOTE:-/opt/alloc-context}"
          USER="${VPS_USER:-root}"
          rsync -avz --delete \
            --exclude '.venv/' \
            --exclude '.git/' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '/state/' \
            --exclude 'config/config.yaml' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "${USER}@${VPS_HOST}:${REMOTE}/"

      - name: Install on VPS
        env:
          DEPLOYED_SHA: ${{ steps.checkout.outputs.sha }}
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
          ALLOC_CONTEXT_ENV_FILE: ${{ vars.ALLOC_CONTEXT_ENV_FILE }}
        run: |
          USER="${VPS_USER:-root}"
          REMOTE="${ALLOC_CONTEXT_REMOTE:-/opt/alloc-context}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${USER}@${VPS_HOST}" \
            "DEPLOYED_SHA=${DEPLOYED_SHA} ALLOC_CONTEXT_REMOTE=${REMOTE} ALLOC_CONTEXT_ENV_FILE=${ALLOC_CONTEXT_ENV_FILE} bash -s" \
            < deploy/remote-install.sh

      - name: Post-deploy smoke
        env:
          SMOKE_EXPECT_CORE_SHA: ${{ steps.checkout.outputs.sha }}
          ALLOC_CONTEXT_OPERATOR_REMOTE: ${{ vars.ALLOC_CONTEXT_OPERATOR_REMOTE }}
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
        run: bash deploy/run-vps-smoke.sh

      - name: Post-deploy x402 check
        env:
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
          ALLOC_CONTEXT_ENV_FILE: ${{ vars.ALLOC_CONTEXT_ENV_FILE }}
        run: bash deploy/run-vps-x402-check.sh

      - name: Deploy summary
        run: |
          echo "Released v${{ needs.check.outputs.version }} (${{ steps.checkout.outputs.sha }}) to configured host"

  finalize:
    needs: [check, publish-pypi, publish-mcp-registry, deploy]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${VERSION}"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes
