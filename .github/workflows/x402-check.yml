name: x402-check

on:
  schedule:
    # Tuesdays 06:30 UTC — after Monday smoke window
    - cron: "30 6 * * 2"
  workflow_dispatch:

jobs:
  vps-x402-check:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Require VPS secrets
        run: |
          test -n "${{ secrets.VPS_SSH_KEY }}" || {
            echo "VPS_SSH_KEY secret is not set — see docs/self-hosting.md"
            exit 1
          }
          test -n "${VPS_HOST}" || {
            echo "VPS_HOST secret is not set — see docs/self-hosting.md"
            exit 1
          }

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Run x402 production check on VPS
        env:
          ALLOC_CONTEXT_REMOTE: ${{ vars.ALLOC_CONTEXT_REMOTE }}
          ALLOC_CONTEXT_ENV_FILE: ${{ vars.ALLOC_CONTEXT_ENV_FILE }}
        run: bash deploy/run-vps-x402-check.sh
